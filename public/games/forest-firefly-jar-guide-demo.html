<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Forest Firefly Jar Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0a1628;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
  "type": "true_false",
  "prompt": "Octopuses have three hearts.",
  "choices": [
    {
      "text": "True",
      "is_correct": true,
      "explanation": "Two pump blood to the gills, one pumps it to the rest of the body."
    },
    {
      "text": "False",
      "is_correct": false,
      "explanation": "They really do have three hearts!"
    }
  ],
  "isLastQuestion": true
};

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      const nextLabel = QUESTION.isLastQuestion ? null : 'Next';
      if (nextLabel) drawMobileButton(restartButton, 'Restart', '#E87A3E', true); else drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
            if (nextLabel) drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#0a1628',
    bgForest: '#0d1f1a',
    treeDark: '#0b1a12',
    treeMid: '#14291e',
    treeLight: '#1a3528',
    pathDark: '#2a1f14',
    pathMid: '#3d2e1c',
    pathLight: '#4d3c28',
    moonGlow: 'rgba(240, 235, 200, 0.15)',
    moonCore: '#f0ebc8',
    fireflyCore: '#F5A742',
    fireflyGlow: 'rgba(245, 167, 66, 0.4)',
    fireflyOuter: 'rgba(245, 167, 66, 0.1)',
    jarGlass: 'rgba(78, 205, 196, 0.25)',
    jarRim: '#4ECDC4',
    jarHighlight: 'rgba(255, 255, 255, 0.15)',
    starDim: 'rgba(240, 235, 200, 0.3)',
    starBright: 'rgba(240, 235, 200, 0.7)',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
  };

  // === GAME STATE ===
  let firefly = null;
  let jars = [];
  let ambientFireflies = [];
  let stars = [];
  let trees = [];
  let gameTime = 0;
  let touchActive = false;
  let touchPos = { x: 0, y: 0 };
  let touchStart = { x: 0, y: 0 };
  let selectedJar = -1;
  let answerAnim = { active: false, timer: 0, jarIndex: -1, isCorrect: false };
  let entranceAnim = { timer: 0, duration: 0.8 };

  // Sound effects via Web Audio API
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialApproachValueAtTarget(0.001, ctx.currentTime + 0.4, 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialApproachValueAtTarget(0.001, ctx.currentTime + 0.3, 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialApproachValueAtTarget(0.001, ctx.currentTime + 0.08, 0.02);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.1);
      } else if (type === 'glow') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialApproachValueAtTarget(0.001, ctx.currentTime + 0.2, 0.05);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.25);
      }
    } catch(e) {}
  }

  function recalculateTextSizing() {
    if (!jars || jars.length === 0) return;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 310,
      availableHeight: 240,
      minFont: 14,
      maxFont: 18,
      itemPadding: 8,
      fontFamily: "'Nunito', sans-serif"
    });

    jars.forEach((jar, i) => {
      jar.wrappedText = wrappedTexts[i];
      jar.fontSize = fontSize;
    });
  }

  function initGame() {
    gameTime = 0;
    touchActive = false;
    selectedJar = -1;
    answerAnim = { active: false, timer: 0, jarIndex: -1, isCorrect: false };
    entranceAnim = { timer: 0, duration: 0.8 };

    // Firefly — starts at top center, drifts gently
    firefly = {
      x: W / 2,
      y: 80,
      targetX: W / 2,
      targetY: 80,
      baseX: W / 2,
      baseY: 80,
      radius: 6,
      glowRadius: 20,
      pulse: 0,
      trail: [],
      scale: 1,
      alpha: 1,
    };

    // Four jars — positioned in a 2x2 grid in lower half
    const jarW = 140;
    const jarH = 100;
    const jarGap = 20;
    const gridStartX = (W - jarW * 2 - jarGap) / 2;
    const gridStartY = 360;

    jars = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      return {
        x: gridStartX + col * (jarW + jarGap),
        y: gridStartY + row * (jarH + jarGap + 40),
        w: jarW,
        h: jarH,
        choice: choice,
        index: i,
        glowIntensity: 0,
        scale: 0,
        alpha: 0,
        shake: 0,
        wrappedText: [choice.text],
        fontSize: 16,
        hasFirefly: false,
        captureAnim: 0,
      };
    });

    // Stars
    stars = [];
    for (let i = 0; i < 40; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * 200,
        size: Math.random() * 1.5 + 0.5,
        twinkleSpeed: Math.random() * 2 + 1,
        twinkleOffset: Math.random() * Math.PI * 2,
      });
    }

    // Background trees
    trees = [];
    for (let i = 0; i < 12; i++) {
      trees.push({
        x: Math.random() * W,
        y: 120 + Math.random() * 200,
        height: 80 + Math.random() * 120,
        width: 20 + Math.random() * 30,
        shade: Math.random(),
      });
    }
    trees.sort((a, b) => a.y - b.y);

    // Ambient fireflies (decoration)
    ambientFireflies = [];
    for (let i = 0; i < 8; i++) {
      ambientFireflies.push({
        x: Math.random() * W,
        y: 100 + Math.random() * 250,
        vx: (Math.random() - 0.5) * 20,
        vy: (Math.random() - 0.5) * 15,
        size: 2 + Math.random() * 2,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 1.5 + Math.random() * 2,
      });
    }

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Entrance animation
    if (entranceAnim.timer < entranceAnim.duration) {
      entranceAnim.timer += dt;
      const t = Math.min(entranceAnim.timer / entranceAnim.duration, 1);
      jars.forEach((jar, i) => {
        const staggerT = Math.max(0, Math.min(1, (t - i * 0.1) / 0.5));
        const spring = 1 + Math.sin(staggerT * Math.PI * 2) * 0.2 * (1 - staggerT);
        jar.scale = staggerT * spring;
        jar.alpha = staggerT;
      });
      firefly.alpha = Math.min(1, t * 2);
      firefly.scale = Math.min(1, t * 1.5);
    }

    // Answer animation
    if (answerAnim.active) {
      answerAnim.timer += dt;
      const jar = jars[answerAnim.jarIndex];

      if (answerAnim.isCorrect) {
        // Pulse and glow on correct
        jar.glowIntensity = Math.min(1, answerAnim.timer * 3);
        jar.captureAnim = Math.min(1, answerAnim.timer * 2);
      } else {
        // Shake on wrong
        const decay = Math.max(0, 1 - answerAnim.timer * 2.5);
        jar.shake = Math.sin(answerAnim.timer * 40) * 6 * decay;
      }

      if (answerAnim.timer > 0.6) {
        const choice = jar.choice;
        if (answerAnim.isCorrect) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
        return;
      }
    }

    // Firefly idle drift when not touching
    if (!touchActive && !answerAnim.active) {
      firefly.baseX = W / 2 + Math.sin(gameTime * 0.5) * 30;
      firefly.baseY = 80 + Math.sin(gameTime * 0.7) * 15;
      firefly.targetX = firefly.baseX;
      firefly.targetY = firefly.baseY;
    }

    // Move firefly toward target
    const dx = firefly.targetX - firefly.x;
    const dy = firefly.targetY - firefly.y;
    const speed = touchActive ? 8 : 3;
    firefly.x += dx * speed * dt;
    firefly.y += dy * speed * dt;

    // Firefly pulse
    firefly.pulse += dt * 3;

    // Trail
    if (gameTime % 0.05 < dt) {
      firefly.trail.push({ x: firefly.x, y: firefly.y, alpha: 0.6, size: 3 });
      if (firefly.trail.length > 15) firefly.trail.shift();
    }
    firefly.trail.forEach(t => {
      t.alpha -= dt * 2;
      t.size -= dt * 2;
    });
    firefly.trail = firefly.trail.filter(t => t.alpha > 0);

    // Check if firefly is near a jar
    if (touchActive && !answerAnim.active) {
      selectedJar = -1;
      jars.forEach((jar, i) => {
        const jarCx = jar.x + jar.w / 2;
        const jarCy = jar.y + jar.h / 2;
        const dist = Math.sqrt((firefly.x - jarCx) ** 2 + (firefly.y - jarCy) ** 2);
        if (dist < 60) {
          selectedJar = i;
          jar.glowIntensity = Math.min(1, jar.glowIntensity + dt * 4);
        } else {
          jar.glowIntensity = Math.max(0, jar.glowIntensity - dt * 4);
        }
      });
    } else if (!answerAnim.active) {
      jars.forEach(jar => {
        jar.glowIntensity = Math.max(0, jar.glowIntensity - dt * 3);
      });
    }

    // Ambient fireflies
    ambientFireflies.forEach(af => {
      af.pulse += af.pulseSpeed * dt;
      af.x += af.vx * dt;
      af.y += af.vy * dt;
      // Bounce off edges softly
      if (af.x < 10 || af.x > W - 10) af.vx *= -1;
      if (af.y < 80 || af.y > 330) af.vy *= -1;
      // Random drift
      af.vx += (Math.random() - 0.5) * 30 * dt;
      af.vy += (Math.random() - 0.5) * 20 * dt;
      af.vx = Math.max(-25, Math.min(25, af.vx));
      af.vy = Math.max(-20, Math.min(20, af.vy));
    });
  }

  function drawGame() {
    // Background — dark forest gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#050d18');
    grad.addColorStop(0.3, '#0a1628');
    grad.addColorStop(0.6, '#0d1f1a');
    grad.addColorStop(1, '#14291e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Moon
    drawMoon();

    // Stars
    drawStars();

    // Trees
    drawTrees();

    // Forest path
    drawPath();

    // Ambient fireflies
    drawAmbientFireflies();

    // Jars
    drawJars();

    // Player firefly
    drawFirefly();
  }

  function drawMoon() {
    const moonX = 70;
    const moonY = 60;
    const moonR = 25;

    // Outer glow
    const glowGrad = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 4);
    glowGrad.addColorStop(0, 'rgba(240, 235, 200, 0.12)');
    glowGrad.addColorStop(0.5, 'rgba(240, 235, 200, 0.04)');
    glowGrad.addColorStop(1, 'rgba(240, 235, 200, 0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.ellipse(moonX, moonY, moonR * 4, moonR * 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Moon disc
    ctx.fillStyle = COLORS.moonCore;
    ctx.beginPath();
    ctx.ellipse(moonX, moonY, moonR, moonR * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Crescent shadow
    ctx.fillStyle = '#050d18';
    ctx.beginPath();
    ctx.ellipse(moonX + 8, moonY - 3, moonR * 0.85, moonR * 0.85 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawStars() {
    stars.forEach(star => {
      const twinkle = 0.4 + Math.sin(gameTime * star.twinkleSpeed + star.twinkleOffset) * 0.3;
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = COLORS.starBright;
      ctx.beginPath();
      ctx.ellipse(star.x, star.y, star.size, star.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawTrees() {
    trees.forEach(tree => {
      const shade = tree.shade;
      const color = shade < 0.33 ? COLORS.treeDark : shade < 0.66 ? COLORS.treeMid : COLORS.treeLight;

      // Trunk
      ctx.fillStyle = '#1a1208';
      ctx.fillRect(tree.x - 3, tree.y, 6, tree.height * 0.4);

      // Canopy (triangle)
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(tree.x, tree.y - tree.height * 0.6);
      ctx.lineTo(tree.x - tree.width, tree.y + 10);
      ctx.lineTo(tree.x + tree.width, tree.y + 10);
      ctx.closePath();
      ctx.fill();

      // Second canopy layer
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(tree.x, tree.y - tree.height * 0.35);
      ctx.lineTo(tree.x - tree.width * 1.2, tree.y + tree.height * 0.15);
      ctx.lineTo(tree.x + tree.width * 1.2, tree.y + tree.height * 0.15);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawPath() {
    // Winding forest path
    ctx.fillStyle = COLORS.pathDark;
    ctx.beginPath();
    ctx.moveTo(140, 340);
    ctx.quadraticCurveTo(160, 400, 120, 460);
    ctx.quadraticCurveTo(80, 520, 130, 580);
    ctx.lineTo(230, 580);
    ctx.quadraticCurveTo(280, 520, 240, 460);
    ctx.quadraticCurveTo(200, 400, 220, 340);
    ctx.closePath();
    ctx.fill();

    // Path highlight
    ctx.fillStyle = COLORS.pathMid;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(160, 350);
    ctx.quadraticCurveTo(175, 400, 145, 460);
    ctx.quadraticCurveTo(120, 510, 155, 560);
    ctx.lineTo(205, 560);
    ctx.quadraticCurveTo(240, 510, 215, 460);
    ctx.quadraticCurveTo(185, 400, 200, 350);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawAmbientFireflies() {
    ambientFireflies.forEach(af => {
      const brightness = 0.3 + Math.sin(af.pulse) * 0.3;
      ctx.globalAlpha = brightness;

      // Glow
      const glowGrad = ctx.createRadialGradient(af.x, af.y, 0, af.x, af.y, af.size * 4);
      glowGrad.addColorStop(0, 'rgba(245, 167, 66, 0.4)');
      glowGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.ellipse(af.x, af.y, af.size * 4, af.size * 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = COLORS.fireflyCore;
      ctx.beginPath();
      ctx.ellipse(af.x, af.y, af.size, af.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;
    });
  }

  function drawJars() {
    jars.forEach((jar, i) => {
      if (jar.alpha <= 0) return;

      ctx.save();
      const cx = jar.x + jar.w / 2;
      const cy = jar.y + jar.h / 2;

      // Apply entrance animation scale
      ctx.translate(cx, cy);
      ctx.scale(jar.scale, jar.scale);
      ctx.translate(-cx, -cy);

      // Apply shake
      if (jar.shake !== 0) {
        ctx.translate(jar.shake, 0);
      }

      ctx.globalAlpha = jar.alpha;

      // Glow behind jar when highlighted
      if (jar.glowIntensity > 0) {
        const glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, jar.w * 0.8);
        glowGrad.addColorStop(0, `rgba(245, 167, 66, ${jar.glowIntensity * 0.3})`);
        glowGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.ellipse(cx, cy, jar.w * 0.8, jar.w * 0.8 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Jar body
      const jx = jar.x + 20;
      const jy = jar.y + 15;
      const jw = jar.w - 40;
      const jh = jar.h - 20;

      // Jar glass
      ctx.fillStyle = COLORS.jarGlass;
      ctx.beginPath();
      ctx.roundRect(jx, jy, jw, jh, [0, 0, 10, 10]);
      ctx.fill();

      // Jar rim (opening at top)
      ctx.strokeStyle = COLORS.jarRim;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(jx - 4, jy);
      ctx.lineTo(jx + jw + 4, jy);
      ctx.stroke();

      // Jar rim sides
      ctx.strokeStyle = COLORS.jarRim;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(jx, jy);
      ctx.lineTo(jx, jy + jh);
      ctx.moveTo(jx + jw, jy);
      ctx.lineTo(jx + jw, jy + jh);
      ctx.stroke();

      // Jar bottom
      ctx.beginPath();
      ctx.moveTo(jx, jy + jh);
      ctx.quadraticCurveTo(jx + jw / 2, jy + jh + 8, jx + jw, jy + jh);
      ctx.stroke();

      // Glass highlight
      ctx.fillStyle = COLORS.jarHighlight;
      ctx.fillRect(jx + 4, jy + 5, 4, jh * 0.6);

      // Captured firefly glow inside jar
      if (jar.captureAnim > 0 && answerAnim.jarIndex === i) {
        const glowAlpha = jar.captureAnim * 0.6;
        const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, jw * 0.6);
        innerGrad.addColorStop(0, `rgba(245, 167, 66, ${glowAlpha})`);
        innerGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
        ctx.fillStyle = innerGrad;
        ctx.beginPath();
        ctx.ellipse(cx, cy + 5, jw * 0.6, jw * 0.6 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Letter label (A, B, C, D)
      const letters = ['A', 'B', 'C', 'D'];
      drawText(letters[i], cx, jy - 10, {
        font: "700 16px 'Belanosima', sans-serif",
        color: COLORS.jarRim,
        align: 'center',
      });

      // Answer text below jar
      const lines = jar.wrappedText || [jar.choice.text];
      const fontSize = jar.fontSize || 16;
      const lineHeight = fontSize + 3;
      const textStartY = jar.y + jar.h + 8;

      lines.forEach((line, li) => {
        drawText(line, cx, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: '#F5F5F0',
          align: 'center',
        });
      });

      ctx.globalAlpha = 1;
      ctx.restore();
    });
  }

  function drawFirefly() {
    if (firefly.alpha <= 0) return;

    ctx.globalAlpha = firefly.alpha;

    // Draw trail
    firefly.trail.forEach(t => {
      if (t.alpha <= 0 || t.size <= 0) return;
      ctx.globalAlpha = t.alpha * 0.4 * firefly.alpha;
      ctx.fillStyle = COLORS.fireflyCore;
      ctx.beginPath();
      ctx.ellipse(t.x, t.y, Math.max(0.5, t.size), Math.max(0.5, t.size * aspectRatio), 0, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.globalAlpha = firefly.alpha;
    const pulse = 0.8 + Math.sin(firefly.pulse) * 0.2;
    const fScale = firefly.scale;

    // Outer glow
    const outerGrad = ctx.createRadialGradient(
      firefly.x, firefly.y, 0,
      firefly.x, firefly.y, firefly.glowRadius * 2 * pulse * fScale
    );
    outerGrad.addColorStop(0, COLORS.fireflyOuter);
    outerGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
    ctx.fillStyle = outerGrad;
    ctx.beginPath();
    ctx.ellipse(firefly.x, firefly.y, firefly.glowRadius * 2 * pulse * fScale, firefly.glowRadius * 2 * pulse * fScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner glow
    const innerGrad = ctx.createRadialGradient(
      firefly.x, firefly.y, 0,
      firefly.x, firefly.y, firefly.glowRadius * pulse * fScale
    );
    innerGrad.addColorStop(0, COLORS.fireflyGlow);
    innerGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.ellipse(firefly.x, firefly.y, firefly.glowRadius * pulse * fScale, firefly.glowRadius * pulse * fScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = COLORS.fireflyCore;
    ctx.beginPath();
    ctx.ellipse(firefly.x, firefly.y, firefly.radius * fScale, firefly.radius * fScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Bright center
    ctx.fillStyle = '#fff8e0';
    ctx.beginPath();
    ctx.ellipse(firefly.x, firefly.y, firefly.radius * 0.4 * fScale, firefly.radius * 0.4 * fScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (answerAnim.active) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      touchActive = true;
      touchStart = { x, y };
      touchPos = { x, y };
      firefly.targetX = x;
      firefly.targetY = y;
      playSound('click');
    } else if (type === 'move') {
      if (!touchActive) return;
      touchPos = { x, y };
      firefly.targetX = x;
      firefly.targetY = y;
    } else if (type === 'end') {
      touchActive = false;

      // Check if firefly is near a jar — select answer
      if (selectedJar >= 0) {
        const jar = jars[selectedJar];
        answerAnim = {
          active: true,
          timer: 0,
          jarIndex: selectedJar,
          isCorrect: jar.choice.is_correct,
        };
        playSound('glow');
        // Move firefly into the jar
        firefly.targetX = jar.x + jar.w / 2;
        firefly.targetY = jar.y + jar.h / 2;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton) || pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (nextLabel && pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (touchActive) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
