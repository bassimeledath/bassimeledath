<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Dig Dug Excavation</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
  "type": "mcq",
  "prompt": "Which country has the most natural lakes?",
  "choices": [
    {
      "text": "United States",
      "is_correct": false,
      "explanation": "The US has many lakes but not the most."
    },
    {
      "text": "Russia",
      "is_correct": false,
      "explanation": "Russia is the largest country but doesn't have the most lakes."
    },
    {
      "text": "Canada",
      "is_correct": true,
      "explanation": "Canada has over 60% of the world's natural lakes."
    },
    {
      "text": "Brazil",
      "is_correct": false,
      "explanation": "Brazil has the Amazon but fewer natural lakes."
    }
  ],
  "isLastQuestion": true
};

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      const nextLabel = QUESTION.isLastQuestion ? null : 'Next';
      if (nextLabel) drawMobileButton(restartButton, 'Restart', '#E87A3E', true); else drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
            if (nextLabel) drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textLight: '#F5F5F0',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === AUDIO ===
  let audioCtx = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playSound(type) {
    if (!audioCtx) initAudio();
    if (!audioCtx) return;

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'dig') {
      oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(523, audioCtx.currentTime);
      oscillator.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      oscillator.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      oscillator.type = 'sawtooth';
      oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'hit') {
      oscillator.type = 'square';
      oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.15);
    }
  }

  // === GAME STATE ===
  let player = null;
  let chests = [];
  let enemies = [];
  let tunnels = []; // Grid of dug cells
  let touchStart = null;
  let swipeDirection = null;
  let gameParticles = []; // Dig particles

  // Grid configuration
  const GRID_COLS = 9;
  const GRID_ROWS = 10;
  const CELL_W = W / GRID_COLS; // 40px
  const CELL_H = (H - 80) / GRID_ROWS; // ~56px (leave top 80px for surface)
  const SURFACE_Y = 80;

  // Chest positions - spread out in grid
  const CHEST_POSITIONS = [
    { col: 1, row: 2 },
    { col: 7, row: 3 },
    { col: 2, row: 6 },
    { col: 6, row: 8 }
  ];

  // Animation state
  let animTime = 0;
  let entranceAnim = 0;

  function recalculateTextSizing() {
    if (!chests || chests.length === 0) return;

    // Each chest label needs to fit in a small area next to chest
    const labelWidth = 130;
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: labelWidth,
      availableHeight: 60,
      minFont: 11,
      maxFont: 14,
      fontFamily: "'Nunito', sans-serif"
    });

    chests.forEach((chest, i) => {
      chest.wrappedText = wrappedTexts[i];
      chest.fontSize = fontSize;
    });
  }

  function initGame() {
    // Initialize player at surface, center
    player = {
      col: 4,
      row: 0,
      x: 4 * CELL_W + CELL_W / 2,
      y: SURFACE_Y + CELL_H / 2,
      targetX: 4 * CELL_W + CELL_W / 2,
      targetY: SURFACE_Y + CELL_H / 2,
      moving: false,
      size: 18
    };

    // Initialize tunnel grid (false = dirt, true = dug)
    tunnels = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      tunnels[r] = [];
      for (let c = 0; c < GRID_COLS; c++) {
        tunnels[r][c] = false;
      }
    }
    // Dig starting position
    tunnels[0][4] = true;

    // Initialize chests at fixed positions
    chests = QUESTION.choices.map((choice, i) => {
      const pos = CHEST_POSITIONS[i];
      return {
        col: pos.col,
        row: pos.row,
        x: pos.col * CELL_W + CELL_W / 2,
        y: SURFACE_Y + pos.row * CELL_H + CELL_H / 2,
        choice: choice,
        wrappedText: [choice.text],
        fontSize: 12,
        bounceOffset: 0,
        label: String.fromCharCode(65 + i) // A, B, C, D
      };
    });

    // Initialize enemies patrolling tunnels
    enemies = [
      { col: 3, row: 4, x: 0, y: 0, dir: 1, speed: 40 },
      { col: 5, row: 7, x: 0, y: 0, dir: -1, speed: 50 }
    ];
    enemies.forEach(e => {
      e.x = e.col * CELL_W + CELL_W / 2;
      e.y = SURFACE_Y + e.row * CELL_H + CELL_H / 2;
    });

    touchStart = null;
    swipeDirection = null;
    animTime = 0;
    entranceAnim = 0;
    gameParticles = [];

    // Entrance animation - chests start hidden
    chests.forEach((chest, i) => {
      chest.scale = 0;
      chest.alpha = 0;
      chest.entranceDelay = i * 0.1;
    });

    recalculateTextSizing();
  }

  // Spawn dig particles
  function spawnDigParticles(x, y) {
    const colors = ['#8B5A2B', '#6B4423', '#A0522D', COLORS.amber];
    for (let i = 0; i < 8; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 100,
        vy: -Math.random() * 80 - 20,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 4 + 2,
        alpha: 1,
        gravity: 200
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;
    entranceAnim += dt;

    // Update entrance animation for chests
    chests.forEach((chest, i) => {
      if (entranceAnim > chest.entranceDelay) {
        const t = Math.min((entranceAnim - chest.entranceDelay) / 0.35, 1);
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        chest.scale = t * spring;
        chest.alpha = t;
        if (t >= 1) {
          chest.scale = 1;
          chest.alpha = 1;
        }
      }
    });

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 2;
      return p.alpha > 0 && p.y < H;
    });

    // Update player movement
    if (player.moving) {
      const dx = player.targetX - player.x;
      const dy = player.targetY - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 200;

      if (dist < speed * dt) {
        player.x = player.targetX;
        player.y = player.targetY;
        player.moving = false;

        // Dig the current cell
        if (player.row >= 0 && player.row < GRID_ROWS &&
            player.col >= 0 && player.col < GRID_COLS) {
          if (!tunnels[player.row][player.col]) {
            tunnels[player.row][player.col] = true;
            spawnDigParticles(player.x, player.y);
            playSound('dig');
          }
        }

        // Check collision with chests
        chests.forEach(chest => {
          if (chest.col === player.col && chest.row === player.row) {
            if (chest.choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(chest.choice.is_correct, chest.choice.explanation);
          }
        });
      } else {
        player.x += (dx / dist) * speed * dt;
        player.y += (dy / dist) * speed * dt;
      }
    }

    // Update enemies
    enemies.forEach(enemy => {
      enemy.x += enemy.dir * enemy.speed * dt;

      // Bounce off edges
      const minX = CELL_W / 2;
      const maxX = W - CELL_W / 2;
      if (enemy.x <= minX || enemy.x >= maxX) {
        enemy.dir *= -1;
        enemy.x = Math.max(minX, Math.min(maxX, enemy.x));
      }

      // Check collision with player
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 25) {
        // Player hit enemy - reset position
        playSound('hit');
        player.col = 4;
        player.row = 0;
        player.x = 4 * CELL_W + CELL_W / 2;
        player.y = SURFACE_Y + CELL_H / 2;
        player.targetX = player.x;
        player.targetY = player.y;
        player.moving = false;
      }
    });

    // Animate chests
    chests.forEach((chest, i) => {
      chest.bounceOffset = Math.sin(animTime * 2 + i * 0.5) * 3;
    });

    // Process swipe input
    if (swipeDirection && !player.moving) {
      let newCol = player.col;
      let newRow = player.row;

      switch (swipeDirection) {
        case 'up': newRow = Math.max(0, player.row - 1); break;
        case 'down': newRow = Math.min(GRID_ROWS - 1, player.row + 1); break;
        case 'left': newCol = Math.max(0, player.col - 1); break;
        case 'right': newCol = Math.min(GRID_COLS - 1, player.col + 1); break;
      }

      if (newCol !== player.col || newRow !== player.row) {
        player.col = newCol;
        player.row = newRow;
        player.targetX = newCol * CELL_W + CELL_W / 2;
        player.targetY = SURFACE_Y + newRow * CELL_H + CELL_H / 2;
        player.moving = true;
      }

      swipeDirection = null;
    }
  }

  function drawGame() {
    // Sky gradient at top
    const skyGrad = ctx.createLinearGradient(0, 0, 0, SURFACE_Y);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(1, COLORS.cyan);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, SURFACE_Y);

    // Draw sun with glow
    ctx.fillStyle = 'rgba(245, 167, 66, 0.3)';
    ctx.beginPath();
    ctx.ellipse(50, 35, 30, 30 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.ellipse(50, 35, 22, 22 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Underground dirt background
    const dirtGrad = ctx.createLinearGradient(0, SURFACE_Y, 0, H);
    dirtGrad.addColorStop(0, '#8B5A2B');
    dirtGrad.addColorStop(0.5, '#6B4423');
    dirtGrad.addColorStop(1, '#4A3520');
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(0, SURFACE_Y, W, H - SURFACE_Y);

    // Draw grass line at surface
    ctx.fillStyle = COLORS.success;
    ctx.fillRect(0, SURFACE_Y - 8, W, 12);

    // Draw grid cells (dirt vs dug)
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const x = c * CELL_W;
        const y = SURFACE_Y + r * CELL_H;

        if (tunnels[r][c]) {
          // Dug tunnel - darker background with subtle gradient
          ctx.fillStyle = '#3D2817';
          ctx.fillRect(x + 2, y + 2, CELL_W - 4, CELL_H - 4);
          // Subtle border
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 2, y + 2, CELL_W - 4, CELL_H - 4);
        } else {
          // Draw subtle dirt texture
          ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
          ctx.fillRect(x + 1, y + 1, CELL_W - 2, 1);
        }
      }
    }

    // Draw chests with entrance animation
    chests.forEach((chest, i) => {
      if (chest.alpha <= 0) return;

      const cx = chest.x;
      const cy = chest.y + chest.bounceOffset;

      ctx.save();
      ctx.globalAlpha = chest.alpha;
      ctx.translate(cx, cy);
      ctx.scale(chest.scale, chest.scale);
      ctx.translate(-cx, -cy);

      // Chest glow
      ctx.fillStyle = `rgba(245, 167, 66, ${0.3 * chest.alpha})`;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 24, 24 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Chest body
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.roundRect(cx - 15, cy - 10, 30, 20, 3);
      ctx.fill();

      // Chest lid
      ctx.fillStyle = '#A0522D';
      ctx.beginPath();
      ctx.roundRect(cx - 16, cy - 14, 32, 8, [3, 3, 0, 0]);
      ctx.fill();

      // Chest bands
      ctx.fillStyle = COLORS.amber;
      ctx.fillRect(cx - 16, cy - 7, 32, 2);
      ctx.fillRect(cx - 1, cy - 14, 2, 24);

      // Chest lock
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.ellipse(cx, cy - 5, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // Letter label on chest (outside scale transform)
      if (chest.alpha >= 0.5) {
        drawText(chest.label, cx, cy + 2, {
          font: "bold 14px 'Nunito Sans', sans-serif",
          color: '#FFFFFF'
        });

        // Draw answer text below chest
        const lines = chest.wrappedText || [chest.choice.text];
        const fontSize = chest.fontSize || 12;
        const lineHeight = fontSize + 2;
        const startY = cy + 22;

        lines.forEach((line, lineIdx) => {
          drawText(line, cx, startY + lineIdx * lineHeight, {
            font: `${fontSize}px 'Nunito', sans-serif`,
            color: COLORS.textLight,
            align: 'center'
          });
        });
      }
    });

    // Draw particles
    gameParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw enemies
    enemies.forEach(enemy => {
      const ex = enemy.x;
      const ey = enemy.y;
      const wobble = Math.sin(animTime * 8) * 2;

      // Enemy body (monster)
      ctx.fillStyle = COLORS.error;
      ctx.beginPath();
      ctx.ellipse(ex, ey + wobble * 0.3, 14, 14 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Enemy outline
      ctx.strokeStyle = COLORS.orangeHover;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Enemy eyes
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(ex - 5, ey - 3 + wobble * 0.3, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.ellipse(ex + 5, ey - 3 + wobble * 0.3, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Pupils
      ctx.fillStyle = COLORS.textPrimary;
      ctx.beginPath();
      ctx.ellipse(ex - 5 + enemy.dir * 2, ey - 3 + wobble * 0.3, 2, 2 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.ellipse(ex + 5 + enemy.dir * 2, ey - 3 + wobble * 0.3, 2, 2 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Angry mouth
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ex - 6, ey + 5 + wobble * 0.3);
      ctx.lineTo(ex, ey + 3 + wobble * 0.3);
      ctx.lineTo(ex + 6, ey + 5 + wobble * 0.3);
      ctx.stroke();
    });

    // Draw player (digger)
    const px = player.x;
    const py = player.y;
    const playerBob = player.moving ? Math.sin(animTime * 15) * 2 : 0;

    // Player shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.beginPath();
    ctx.ellipse(px, py + 12, 12, 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Player body
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.ellipse(px, py + playerBob, player.size, player.size * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Player helmet
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.ellipse(px, py - 8 + playerBob, 12, 8 * aspectRatio, 0, Math.PI, Math.PI * 2);
    ctx.fill();

    // Helmet light (pulsing)
    const lightPulse = 0.7 + Math.sin(animTime * 4) * 0.3;
    ctx.fillStyle = `rgba(255, 255, 255, ${lightPulse})`;
    ctx.beginPath();
    ctx.ellipse(px, py - 14 + playerBob, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(px, py - 14 + playerBob, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Player face
    ctx.fillStyle = '#FFE4C4';
    ctx.beginPath();
    ctx.ellipse(px, py + playerBob, 10, 10 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.ellipse(px - 3, py - 2 + playerBob, 2, 2 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.ellipse(px + 3, py - 2 + playerBob, 2, 2 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.strokeStyle = COLORS.textPrimary;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(px, py + 1 + playerBob, 4, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      touchStart = { x, y };
    } else if (type === 'end' && touchStart) {
      const dx = x - touchStart.x;
      const dy = y - touchStart.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Minimum swipe distance
      if (dist > 20) {
        if (Math.abs(dx) > Math.abs(dy)) {
          swipeDirection = dx > 0 ? 'right' : 'left';
        } else {
          swipeDirection = dy > 0 ? 'down' : 'up';
        }
      } else {
        // Tap - move toward tap location
        const playerCenterX = player.col * CELL_W + CELL_W / 2;
        const playerCenterY = SURFACE_Y + player.row * CELL_H + CELL_H / 2;

        const tapDx = x - playerCenterX;
        const tapDy = y - playerCenterY;

        if (Math.abs(tapDx) > Math.abs(tapDy)) {
          swipeDirection = tapDx > 0 ? 'right' : 'left';
        } else {
          swipeDirection = tapDy > 0 ? 'down' : 'up';
        }
      }

      touchStart = null;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton) || pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (nextLabel && pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
