<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Piñata Bash</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #FAFAF7;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #FAFAF7;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
  "type": "true_false",
  "prompt": "Lightning never strikes the same place twice.",
  "choices": [
    {
      "text": "True",
      "is_correct": false,
      "explanation": "Lightning frequently strikes the same place, especially tall structures."
    },
    {
      "text": "False",
      "is_correct": true,
      "explanation": "The Empire State Building gets struck about 20-25 times per year."
    }
  ],
  "isLastQuestion": true
};

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      const nextLabel = QUESTION.isLastQuestion ? null : 'Next';
      if (nextLabel) drawMobileButton(restartButton, 'Restart', '#E87A3E', true); else drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
            if (nextLabel) drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0'
  };

  // === SOUND SYSTEM ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(type) {
    if (prefersReducedMotion) return;
    try {
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'swing') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'hit') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }
    } catch (e) {}
  }

  // === GAME STATE ===
  let pinata = {
    x: W / 2,
    y: 180,
    swingAngle: 0,
    swingSpeed: 1.2,
    radius: 65
  };

  let bat = {
    x: W / 2,
    y: 520,
    angle: -Math.PI / 2,
    swinging: false,
    swingProgress: 0,
    targetSection: -1,
    length: 100
  };

  let sections = [];
  let candyParticles = [];
  let crackEffect = null;
  let isHolding = false;
  let holdTime = 0;
  let aimIndicator = 0;
  let gameTime = 0;
  let entranceProgress = 0;
  let shakeEffect = { active: false, time: 0, intensity: 0 };

  const sectionColors = [COLORS.orange, COLORS.cyan, COLORS.amber, COLORS.success];

  function initGame() {
    pinata.swingAngle = 0;
    bat.swinging = false;
    bat.swingProgress = 0;
    bat.targetSection = -1;
    candyParticles = [];
    crackEffect = null;
    isHolding = false;
    holdTime = 0;
    aimIndicator = 0;
    gameTime = 0;
    entranceProgress = 0;
    shakeEffect = { active: false, time: 0, intensity: 0 };

    sections = QUESTION.choices.map((choice, i) => ({
      index: i,
      choice: choice,
      color: sectionColors[i],
      cracked: false,
      wrappedText: [],
      fontSize: 14,
      scale: 0,
      alpha: 0
    }));

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!sections || sections.length === 0) return;

    const maxWidth = 110;

    sections.forEach((section, i) => {
      const { fontSize, wrappedTexts } = findOptimalFontSize({
        texts: [section.choice.text],
        maxWidth: maxWidth,
        availableHeight: 55,
        minFont: 12,
        maxFont: 16,
        fontFamily: "'Nunito', sans-serif"
      });
      section.wrappedText = wrappedTexts[0];
      section.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation for answer boxes
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2);
      sections.forEach((section, i) => {
        const delay = i * 0.1;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.4));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        section.scale = t * spring;
        section.alpha = t;
      });
    }

    // Swing the pinata gently with breathing effect
    const breathe = Math.sin(gameTime * 3) * 0.01;
    pinata.swingAngle = Math.sin(gameTime * pinata.swingSpeed) * 0.15 + breathe;

    // Update hold time for aim cycling
    if (isHolding && !bat.swinging) {
      holdTime += dt;
      aimIndicator = Math.floor(holdTime / 0.4) % 4;
    }

    // Update shake effect
    if (shakeEffect.active) {
      shakeEffect.time += dt;
      if (shakeEffect.time > 0.4) {
        shakeEffect.active = false;
      }
    }

    // Update bat swing
    if (bat.swinging) {
      bat.swingProgress += dt * 4;

      if (bat.swingProgress >= 1) {
        const section = sections[bat.targetSection];
        if (section) {
          section.cracked = true;
          crackEffect = { section: bat.targetSection, time: 0 };
          playSound('hit');
          spawnCandy(bat.targetSection);

          if (!section.choice.is_correct) {
            shakeEffect = { active: true, time: 0, intensity: 8 };
          }

          setTimeout(() => {
            if (section.choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(section.choice.is_correct, section.choice.explanation);
          }, 400);
        }

        bat.swinging = false;
        bat.swingProgress = 0;
      }
    }

    if (crackEffect) {
      crackEffect.time += dt;
    }

    // Update candy particles
    candyParticles.forEach(p => {
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha = Math.max(0, p.alpha - dt * 0.5);
    });
    candyParticles = candyParticles.filter(p => p.y < H + 20 && p.alpha > 0);
  }

  function spawnCandy(sectionIndex) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success, '#FFD700', '#FF69B4'];
    const cx = pinata.x;
    const cy = pinata.y;

    for (let i = 0; i < 25; i++) {
      const angle = (sectionIndex * Math.PI / 2 + Math.PI / 4) + (Math.random() - 0.5) * 1.2;
      const speed = 100 + Math.random() * 150;
      candyParticles.push({
        x: cx + Math.cos(angle) * 30,
        y: cy + Math.sin(angle) * 30 * aspectRatio,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 150,
        size: 5 + Math.random() * 10,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 12,
        shape: ['circle', 'rect', 'star'][Math.floor(Math.random() * 3)],
        alpha: 1
      });
    }
  }

  function drawGame() {
    // Apply shake effect
    if (shakeEffect.active) {
      const decay = 1 - shakeEffect.time / 0.4;
      const shakeX = Math.sin(shakeEffect.time * Math.PI * 20) * shakeEffect.intensity * decay;
      ctx.translate(shakeX, 0);
    }

    // Clear canvas with warm sky gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#E8F9F8');
    gradient.addColorStop(0.5, '#FFF8E8');
    gradient.addColorStop(1, COLORS.bgPrimary);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw decorative clouds
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    drawCloud(50, 60, 30);
    drawCloud(280, 40, 25);
    drawCloud(150, 90, 20);

    // Draw string with slight curve
    ctx.strokeStyle = '#8B5A2B';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    const stringEndX = pinata.x + Math.sin(pinata.swingAngle) * 25;
    const stringEndY = pinata.y - pinata.radius * aspectRatio - 5;
    ctx.quadraticCurveTo(W / 2, pinata.y / 2, stringEndX, stringEndY);
    ctx.stroke();

    // Draw pinata
    ctx.save();
    ctx.translate(pinata.x, pinata.y);
    ctx.rotate(pinata.swingAngle);
    ctx.scale(1, aspectRatio);

    // Pinata body shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    ctx.beginPath();
    ctx.arc(3, 3, pinata.radius, 0, Math.PI * 2);
    ctx.fill();

    // Draw 4 colored sections
    for (let i = 0; i < 4; i++) {
      const startAngle = -Math.PI / 4 + (i * Math.PI / 2);
      const endAngle = startAngle + Math.PI / 2;

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, pinata.radius, startAngle, endAngle);
      ctx.closePath();

      // Highlight aimed section with pulse
      if (!bat.swinging && isHolding && i === aimIndicator) {
        const pulse = 1 + Math.sin(gameTime * 8) * 0.1;
        ctx.save();
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#FFFFFF';
        ctx.fill();
        ctx.fillStyle = sections[i].color;
        ctx.globalAlpha = 0.8;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      } else {
        ctx.fillStyle = sections[i].color;
        ctx.fill();
      }

      // Section border
      ctx.strokeStyle = COLORS.textPrimary;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw letter label in section
      const midAngle = startAngle + Math.PI / 4;
      const labelR = pinata.radius * 0.55;
      const lx = Math.cos(midAngle) * labelR;
      const ly = Math.sin(midAngle) * labelR;
      ctx.fillStyle = '#FFFFFF';
      ctx.font = "bold 22px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(['A', 'B', 'C', 'D'][i], lx, ly);

      // Crack effect
      if (sections[i].cracked && crackEffect && crackEffect.section === i) {
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 3;
        for (let j = 0; j < 6; j++) {
          const crackAngle = midAngle + (Math.random() - 0.5) * 0.6;
          const crackLen = 15 + Math.random() * 40;
          ctx.beginPath();
          ctx.moveTo(Math.cos(crackAngle) * 8, Math.sin(crackAngle) * 8);
          ctx.lineTo(Math.cos(crackAngle) * crackLen, Math.sin(crackAngle) * crackLen);
          ctx.stroke();
        }
      }
    }

    // Pinata fringe decoration
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const fx = Math.cos(angle) * pinata.radius;
      const fy = Math.sin(angle) * pinata.radius;
      ctx.strokeStyle = sectionColors[i % 4];
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx * 1.15, fy * 1.15);
      ctx.stroke();
    }

    ctx.restore();

    // Draw answer boxes below pinata
    const labelY = pinata.y + pinata.radius * aspectRatio + 25;
    const labels = ['A', 'B', 'C', 'D'];

    const boxWidth = 165;
    const boxHeight = 68;
    const boxPadding = 8;
    const startX = (W - boxWidth * 2 - boxPadding) / 2;
    const startY = labelY + 15;

    sections.forEach((section, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const bx = startX + col * (boxWidth + boxPadding);
      const by = startY + row * (boxHeight + boxPadding);

      // Apply entrance animation
      ctx.save();
      ctx.translate(bx + boxWidth / 2, by + boxHeight / 2);
      ctx.scale(section.scale || 1, section.scale || 1);
      ctx.globalAlpha = section.alpha || 1;
      ctx.translate(-(bx + boxWidth / 2), -(by + boxHeight / 2));

      // Box shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ctx.beginPath();
      ctx.roundRect(bx + 2, by + 2, boxWidth, boxHeight, 12);
      ctx.fill();

      // Box background
      ctx.fillStyle = COLORS.bgSurface;
      ctx.beginPath();
      ctx.roundRect(bx, by, boxWidth, boxHeight, 12);
      ctx.fill();

      // Box border
      const isAimed = !bat.swinging && isHolding && i === aimIndicator;
      ctx.strokeStyle = isAimed ? section.color : COLORS.borderSubtle;
      ctx.lineWidth = isAimed ? 3 : 1.5;
      ctx.stroke();

      // Color stripe on left
      ctx.fillStyle = section.color;
      ctx.beginPath();
      ctx.roundRect(bx, by, 28, boxHeight, [12, 0, 0, 12]);
      ctx.fill();

      // Letter label
      drawText(labels[i], bx + 14, by + boxHeight / 2, {
        font: "bold 18px 'Belanosima', sans-serif",
        color: '#FFFFFF'
      });

      // Answer text
      const textX = bx + 36;
      const textY = by + 10;
      const lines = section.wrappedText;
      const lineHeight = section.fontSize + 3;
      const totalTextHeight = lines.length * lineHeight;
      const textStartY = by + (boxHeight - totalTextHeight) / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        drawText(line, textX, textStartY + li * lineHeight, {
          font: `500 ${section.fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'left'
        });
      });

      ctx.restore();
    });

    // Draw candy particles
    candyParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.scale(1, aspectRatio);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'star') {
        drawStar(0, 0, p.size / 2, 5);
      } else {
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      }
      ctx.restore();
    });

    // Draw bat
    drawBat();

    // Draw hint text
    if (!bat.swinging && entranceProgress >= 1) {
      const hintText = isHolding ? `Aiming: ${labels[aimIndicator]}` : 'Hold to aim, release to swing!';
      drawText(hintText, W / 2, H - 35, {
        font: "500 16px 'Nunito Sans', sans-serif",
        color: COLORS.textSecondary
      });
    }
  }

  function drawCloud(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, aspectRatio);
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, Math.PI * 2);
    ctx.arc(size * 0.8, -size * 0.2, size * 0.7, 0, Math.PI * 2);
    ctx.arc(-size * 0.7, size * 0.1, size * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawStar(cx, cy, r, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const radius = i % 2 === 0 ? r : r * 0.5;
      if (i === 0) ctx.moveTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
      else ctx.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawBat() {
    ctx.save();
    ctx.translate(bat.x, bat.y);

    // Calculate swing animation with easing
    let swingAngle = 0;
    if (bat.swinging) {
      // Swing with spring easing
      const t = bat.swingProgress;
      const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      swingAngle = -Math.PI / 3 + eased * Math.PI * 0.85;
    } else if (isHolding) {
      // Ready stance with anticipation wobble
      swingAngle = -Math.PI / 4 + Math.sin(holdTime * 10) * 0.08;
    }

    ctx.rotate(swingAngle);
    ctx.scale(1, aspectRatio);

    // Bat shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.beginPath();
    ctx.moveTo(-10, 5);
    ctx.lineTo(-16, -bat.length + 25);
    ctx.quadraticCurveTo(-18, -bat.length + 5, 2, -bat.length - 5);
    ctx.quadraticCurveTo(22, -bat.length + 5, 20, -bat.length + 25);
    ctx.lineTo(14, 5);
    ctx.closePath();
    ctx.fill();

    // Bat handle with gradient
    const handleGradient = ctx.createLinearGradient(-10, 0, 10, 0);
    handleGradient.addColorStop(0, '#5D3A1A');
    handleGradient.addColorStop(0.5, '#8B5A2B');
    handleGradient.addColorStop(1, '#5D3A1A');
    ctx.fillStyle = handleGradient;
    ctx.beginPath();
    ctx.roundRect(-9, -5, 18, 45, 3);
    ctx.fill();

    // Handle grip lines
    ctx.strokeStyle = '#3D2A1A';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(-7, 5 + i * 6);
      ctx.lineTo(7, 5 + i * 6);
      ctx.stroke();
    }

    // Bat body with wood grain gradient
    const batGradient = ctx.createLinearGradient(0, -bat.length, 0, 0);
    batGradient.addColorStop(0, '#DEB887');
    batGradient.addColorStop(0.3, '#D2B48C');
    batGradient.addColorStop(0.6, '#C4A67C');
    batGradient.addColorStop(1, '#A0826D');
    ctx.fillStyle = batGradient;

    ctx.beginPath();
    ctx.moveTo(-12, -5);
    ctx.lineTo(-18, -bat.length + 20);
    ctx.quadraticCurveTo(-22, -bat.length, 0, -bat.length - 12);
    ctx.quadraticCurveTo(22, -bat.length, 18, -bat.length + 20);
    ctx.lineTo(12, -5);
    ctx.closePath();
    ctx.fill();

    // Bat outline
    ctx.strokeStyle = '#8B5A2B';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Wood grain details
    ctx.strokeStyle = 'rgba(139, 90, 43, 0.3)';
    ctx.lineWidth = 1;
    for (let i = 1; i <= 4; i++) {
      const y = -bat.length + 15 + i * 18;
      ctx.beginPath();
      ctx.moveTo(-14, y);
      ctx.quadraticCurveTo(0, y - 3, 14, y);
      ctx.stroke();
    }

    ctx.restore();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (bat.swinging) return;

    if (type === 'start') {
      isHolding = true;
      holdTime = 0;
      ensureAudio();
    } else if (type === 'end' && isHolding) {
      isHolding = false;
      bat.swinging = true;
      bat.swingProgress = 0;
      bat.targetSection = aimIndicator;
      playSound('swing');
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton) || pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (nextLabel && pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
