<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Dice Tower Roll</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
  "type": "mcq",
  "prompt": "Who painted the Mona Lisa?",
  "choices": [
    {
      "text": "Michelangelo",
      "is_correct": false,
      "explanation": "Michelangelo painted the Sistine Chapel ceiling."
    },
    {
      "text": "Leonardo da Vinci",
      "is_correct": true,
      "explanation": "Da Vinci painted it between 1503 and 1519."
    },
    {
      "text": "Raphael",
      "is_correct": false,
      "explanation": "Raphael was known for The School of Athens."
    },
    {
      "text": "Donatello",
      "is_correct": false,
      "explanation": "Donatello was primarily a sculptor."
    }
  ],
  "isLastQuestion": true
};

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito Sans', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      if (nextLabel) drawMobileButton(restartButton, 'Restart', '#E87A3E', true); else drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? null : 'Next';
      if (nextLabel) drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLOR PALETTE ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgDark: '#1C1C1A',
    surface: '#2A2A27',
    textPrimary: '#2B2B28',
    textLight: '#F5F5F0',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // Zone colors for the four answer areas
  const ZONE_COLORS = [COLORS.orange, COLORS.cyan, COLORS.amber, COLORS.success];

  // === AUDIO ===
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'shake') {
      osc.frequency.value = 150 + Math.random() * 100;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'roll') {
      osc.frequency.value = 200;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'land') {
      osc.frequency.value = 100;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
  }

  // === GAME STATE ===
  let phase = 'ready'; // 'ready' | 'shaking' | 'rolling' | 'landed'
  let cup = { x: W / 2, y: 160, baseX: W / 2, baseY: 160, shake: 0 };
  let dice = [
    { x: W / 2 - 15, y: 150, value: 1, vx: 0, vy: 0, rotation: 0, rotationSpeed: 0 },
    { x: W / 2 + 15, y: 150, value: 1, vx: 0, vy: 0, rotation: 0, rotationSpeed: 0 }
  ];
  let shakeEnergy = 0;
  let touchStart = null;
  let lastTouchPos = null;
  let shakeVelocities = [];
  let zones = [];
  let selectedZone = -1;
  let entranceTime = 0;
  let particles = [];

  // Answer zone text data
  let answerFontSize = 14;
  let wrappedAnswers = [];

  function recalculateTextSizing() {
    if (zones.length === 0) return;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 140,
      availableHeight: 200,
      minFont: 12,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });

    answerFontSize = fontSize;
    wrappedAnswers = wrappedTexts;
  }

  function initGame() {
    phase = 'ready';
    cup = { x: W / 2, y: 160, baseX: W / 2, baseY: 160, shake: 0 };
    dice = [
      { x: W / 2 - 15, y: 150, value: 1, vx: 0, vy: 0, rotation: 0, rotationSpeed: 0 },
      { x: W / 2 + 15, y: 150, value: 1, vx: 0, vy: 0, rotation: 0, rotationSpeed: 0 }
    ];
    shakeEnergy = 0;
    touchStart = null;
    lastTouchPos = null;
    shakeVelocities = [];
    selectedZone = -1;
    entranceTime = 0;
    particles = [];

    // Create four zones as a 2x2 grid on the "table" area
    const tableTop = 320;
    const zoneW = 160;
    const zoneH = 140;
    const gap = 8;
    const startX = (W - zoneW * 2 - gap) / 2;
    const startY = tableTop + 20;

    zones = QUESTION.choices.map((choice, i) => ({
      x: startX + (i % 2) * (zoneW + gap),
      y: startY + Math.floor(i / 2) * (zoneH + gap),
      w: zoneW,
      h: zoneH,
      choice: choice,
      index: i,
      scale: 0,
      alpha: 0
    }));

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Animate zone entrance
    zones.forEach((zone, i) => {
      const delay = i * 0.1;
      const t = Math.max(0, Math.min(1, (entranceTime - delay) / 0.35));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      zone.scale = t * spring;
      zone.alpha = t;
    });

    // Update particles
    particles = particles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 2;
      return p.alpha > 0;
    });

    if (phase === 'shaking') {
      // Cup shake animation based on shake energy
      cup.shake += dt * 30;
      cup.x = cup.baseX + Math.sin(cup.shake * 3) * Math.min(shakeEnergy * 0.5, 15);
      cup.y = cup.baseY + Math.cos(cup.shake * 4) * Math.min(shakeEnergy * 0.3, 10);

      // Dice follow cup
      dice[0].x = cup.x - 15 + Math.sin(cup.shake * 5) * 3;
      dice[0].y = cup.y - 10 + Math.cos(cup.shake * 6) * 3;
      dice[1].x = cup.x + 15 + Math.cos(cup.shake * 5) * 3;
      dice[1].y = cup.y - 10 + Math.sin(cup.shake * 6) * 3;

      // Decay shake energy over time
      shakeEnergy *= 0.95;
    }

    if (phase === 'rolling') {
      // Update dice physics
      dice.forEach(d => {
        d.x += d.vx * dt;
        d.y += d.vy * dt;
        d.vy += 600 * dt; // gravity
        d.rotation += d.rotationSpeed * dt;

        // Bounce off walls
        if (d.x < 30) { d.x = 30; d.vx *= -0.5; }
        if (d.x > W - 30) { d.x = W - 30; d.vx *= -0.5; }

        // Friction
        d.vx *= 0.99;
        d.rotationSpeed *= 0.98;
      });

      // Check if dice have landed on table
      const tableY = 420;
      let allLanded = true;
      dice.forEach(d => {
        if (d.y >= tableY) {
          d.y = tableY;
          d.vy *= -0.3;
          if (Math.abs(d.vy) < 20) {
            d.vy = 0;
            d.vx *= 0.8;
          }
        }
        if (d.vy !== 0 || Math.abs(d.vx) > 5) {
          allLanded = false;
        }
      });

      if (allLanded && dice[0].y >= tableY && dice[1].y >= tableY) {
        phase = 'landed';
        playSound('land');

        // Determine sum and which zone
        const sum = dice[0].value + dice[1].value;
        // Zones based on dice sum ranges: 2-4, 5-6, 7-8, 9-12
        if (sum <= 4) selectedZone = 0;
        else if (sum <= 6) selectedZone = 1;
        else if (sum <= 8) selectedZone = 2;
        else selectedZone = 3;

        // Spawn landing particles
        const zone = zones[selectedZone];
        for (let i = 0; i < 20; i++) {
          particles.push({
            x: zone.x + zone.w / 2,
            y: zone.y + zone.h / 2,
            vx: (Math.random() - 0.5) * 200,
            vy: -Math.random() * 150 - 50,
            color: ZONE_COLORS[selectedZone],
            size: 4 + Math.random() * 4,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 8,
            alpha: 1
          });
        }

        // End game after a short delay
        setTimeout(() => {
          if (gameState === 'playing') {
            const choice = zones[selectedZone].choice;
            engine.end(choice.is_correct, choice.explanation);
          }
        }, 800);
      }
    }
  }

  function drawGame() {
    // Background - warm dark
    ctx.fillStyle = COLORS.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Table surface (lower portion)
    const tableTop = 310;
    ctx.fillStyle = '#3D3D38';
    ctx.fillRect(0, tableTop, W, H - tableTop);

    // Table edge highlight
    ctx.fillStyle = '#4A4A44';
    ctx.fillRect(0, tableTop, W, 4);

    // Draw answer zones (2x2 grid)
    zones.forEach((zone, i) => {
      if (zone.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = zone.alpha;
      ctx.translate(zone.x + zone.w / 2, zone.y + zone.h / 2);
      ctx.scale(zone.scale, zone.scale * aspectRatio);
      ctx.translate(-(zone.x + zone.w / 2), -(zone.y + zone.h / 2));

      // Zone background
      const isSelected = selectedZone === i;
      ctx.fillStyle = isSelected ? ZONE_COLORS[i] : '#2A2A27';
      ctx.beginPath();
      ctx.roundRect(zone.x, zone.y, zone.w, zone.h, 12);
      ctx.fill();

      // Zone border
      ctx.strokeStyle = ZONE_COLORS[i];
      ctx.lineWidth = isSelected ? 4 : 2;
      ctx.stroke();

      // Zone label (dice sum range)
      const ranges = ['2-4', '5-6', '7-8', '9-12'];
      drawText(ranges[i], zone.x + zone.w / 2, zone.y + 20, {
        font: "700 18px 'Belanosima', sans-serif",
        color: isSelected ? '#FFFFFF' : ZONE_COLORS[i]
      });

      ctx.restore();

      // Answer text (drawn separately to maintain proper text scaling)
      if (zone.alpha > 0.5) {
        const lines = wrappedAnswers[i] || [zone.choice.text];
        const lineHeight = answerFontSize + 3;
        const textStartY = zone.y + 42;

        lines.forEach((line, lineIdx) => {
          drawText(line, zone.x + zone.w / 2, textStartY + lineIdx * lineHeight, {
            font: `500 ${answerFontSize}px 'Nunito', sans-serif`,
            color: selectedZone === i ? '#FFFFFF' : COLORS.textLight
          });
        });
      }
    });

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.scale(1, aspectRatio);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });

    // Draw cup (only if not rolled)
    if (phase === 'ready' || phase === 'shaking') {
      // Cup shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(cup.x, cup.y + 50, 50, 15 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cup body
      ctx.fillStyle = COLORS.orange;
      ctx.beginPath();
      ctx.moveTo(cup.x - 45, cup.y - 40);
      ctx.lineTo(cup.x - 35, cup.y + 40);
      ctx.lineTo(cup.x + 35, cup.y + 40);
      ctx.lineTo(cup.x + 45, cup.y - 40);
      ctx.closePath();
      ctx.fill();

      // Cup rim
      ctx.fillStyle = COLORS.orangeHover;
      ctx.beginPath();
      ctx.ellipse(cup.x, cup.y - 40, 45, 12 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cup highlight
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.moveTo(cup.x - 35, cup.y - 35);
      ctx.lineTo(cup.x - 28, cup.y + 30);
      ctx.lineTo(cup.x - 20, cup.y + 30);
      ctx.lineTo(cup.x - 25, cup.y - 35);
      ctx.closePath();
      ctx.fill();

      // Shake energy indicator
      if (shakeEnergy > 5) {
        const barWidth = Math.min(shakeEnergy * 2, 100);
        ctx.fillStyle = COLORS.amber;
        ctx.beginPath();
        ctx.roundRect(W / 2 - 50, cup.y + 70, barWidth, 8, 4);
        ctx.fill();

        ctx.strokeStyle = COLORS.borderStrong;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(W / 2 - 50, cup.y + 70, 100, 8, 4);
        ctx.stroke();
      }
    }

    // Draw dice
    if (phase === 'rolling' || phase === 'landed') {
      dice.forEach(d => {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.scale(1, aspectRatio);
        ctx.rotate(d.rotation);

        // Die body
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.roundRect(-18, -18, 36, 36, 6);
        ctx.fill();

        // Die border
        ctx.strokeStyle = '#D4D4CC';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Pips
        ctx.fillStyle = COLORS.textPrimary;
        const pipPositions = {
          1: [[0, 0]],
          2: [[-8, -8], [8, 8]],
          3: [[-8, -8], [0, 0], [8, 8]],
          4: [[-8, -8], [8, -8], [-8, 8], [8, 8]],
          5: [[-8, -8], [8, -8], [0, 0], [-8, 8], [8, 8]],
          6: [[-8, -8], [8, -8], [-8, 0], [8, 0], [-8, 8], [8, 8]]
        };

        pipPositions[d.value].forEach(([px, py]) => {
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.restore();
      });
    }

    // Instructions (only in ready state)
    if (phase === 'ready') {
      drawText('Shake the cup to roll!', W / 2, 280, {
        font: "600 18px 'Nunito Sans', sans-serif",
        color: COLORS.textLight
      });
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const pos = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      initAudio();

      if (phase === 'ready' || phase === 'shaking') {
        phase = 'shaking';
        touchStart = { x: pos.x, y: pos.y, time: performance.now() };
        lastTouchPos = { x: pos.x, y: pos.y };
        shakeVelocities = [];
      }
    }

    if (type === 'move' && phase === 'shaking') {
      if (lastTouchPos) {
        const dx = pos.x - lastTouchPos.x;
        const dy = pos.y - lastTouchPos.y;
        const velocity = Math.sqrt(dx * dx + dy * dy);

        shakeVelocities.push(velocity);
        if (shakeVelocities.length > 10) shakeVelocities.shift();

        const avgVelocity = shakeVelocities.reduce((a, b) => a + b, 0) / shakeVelocities.length;
        shakeEnergy = Math.min(shakeEnergy + avgVelocity * 0.5, 60);

        if (velocity > 5) {
          playSound('shake');
        }

        lastTouchPos = { x: pos.x, y: pos.y };
      }
    }

    if (type === 'end' && phase === 'shaking') {
      if (shakeEnergy > 15) {
        phase = 'rolling';
        playSound('roll');

        // Roll dice based on shake energy
        const power = Math.min(shakeEnergy / 60, 1);
        dice.forEach((d, i) => {
          d.value = Math.floor(Math.random() * 6) + 1;
          d.vx = (Math.random() - 0.5) * 200 * power + (i === 0 ? -50 : 50);
          d.vy = 150 + Math.random() * 100 * power;
          d.y = cup.y + 50;
          d.x = cup.x + (i === 0 ? -15 : 15);
          d.rotationSpeed = (Math.random() - 0.5) * 15;
        });

        // Reset cup
        cup.x = cup.baseX;
        cup.y = cup.baseY;
      } else {
        // Not enough shake energy
        phase = 'ready';
      }

      shakeEnergy = 0;
      touchStart = null;
      lastTouchPos = null;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton) || pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (nextLabel && pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  let mouseDown = false;
  canvas.addEventListener('mousedown', () => { mouseDown = true; });
  canvas.addEventListener('mouseup', () => { mouseDown = false; });

  canvas.addEventListener('mousemove', (e) => {
    if (mouseDown) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
